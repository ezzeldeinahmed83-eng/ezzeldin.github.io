<!DOCTYPE html>
<html>
<head>
    <title>Add Courses</title>
    <link rel="stylesheet" href="Final_Progect.CSS" />
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="my-courses.html">My Courses</a></li>
                    <li><a href="Add-Courses.html">Add Courses</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="container">
        <div class="main-heading">
            <h2>Add Courses</h2>
        </div>
    <form class="add">
        <div class="course-name">
            <label>Course Name</label>
            <input type="text" required placeholder="Course Name">
        </div>
        <div class="instructor">
            <label>Instructor</label>
            <input type="text" required placeholder="Instructor Name">
        </div>
        <div class="credit-hours">
            <label>Credit Hours</label>
            <input type="number" required min="0" placeholder="Credit Hours">
        </div>
        <div class="notes">
            <label>Notes</label>
            <input type="text" placeholder="Notes">
        </div>
        <div class="submit"><input type="submit" value="Send"></div>
    </form>
</body>
</html>
